- id: '1641241402576'
  alias: Notify- Ridwell Notification
  description: ''
  triggers:
  - trigger: time
    at: '16:00:00'
  conditions:
  - condition: device
    type: is_on
    device_id: 9a34d8d8f307c0b5009ee5121372c626
    entity_id: 0cb220ac26c4be3ca42a1a09311dafe1
    domain: switch
  - condition: template
    value_template: "          {% set ridwell_date = states('sensor.ridwell_pickup_21_73rd_st_sw')
      | as_datetime %}\n          {{ ridwell_date.date() == (now() + timedelta(days=1)).date()
      }}"
  actions:
  - data:
      message: Time to put everything out for Ridwell- They Come Tomorrow!
      data:
        url: /admin-dashboards/Home
        clickAction: /admin-dashboards/Home
    action: notify.notify
  - action: mqtt.publish
    metadata: {}
    data:
      evaluate_payload: false
      qos: '1'
      retain: false
      topic: printer/commands
      payload: '{"printer_name": "ReceiptPrinter", "title": "{{ now().strftime(''%Y-%m-%d
        %H:%M:%S'') }}", "message": "Ridwell comes tomorrow-put out the bags/recycling"}'
  mode: parallel
  max: 10
- id: '1641241435040'
  alias: Notify - Trash Notification
  description: ''
  triggers:
  - event: start
    entity_id: calendar.google_smart_home_reminders
    trigger: calendar
  conditions:
  - condition: template
    value_template: '{{ ''Trash'' in trigger.calendar_event.summary }}'
  actions:
  - data:
      message: It's almost Trash Day-Make sure all the trash out!
    action: notify.notify
  - action: mqtt.publish
    metadata: {}
    data:
      evaluate_payload: false
