- id: '1636483579001'
  alias: Notify - Dishwasher completed
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - binary_sensor.dishwasher_wash_completed
    from: 'off'
    to: 'on'
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - condition: template
    value_template: "{{ this.attributes.last_triggered is none or\n   (now() - this.attributes.last_triggered).total_seconds()
      > 43200 }}\n"
  actions:
  - data:
      message: The Dishwasher has completed it's cycle!
      data:
        url: /config/devices/device/e8bdabe8f0a10b8a5727f7023cdeb0ed
        clickAction: /config/devices/device/e8bdabe8f0a10b8a5727f7023cdeb0ed
    action: notify.notify
  mode: single
- id: '1636926623745'
  alias: Notify - Washer Completed
