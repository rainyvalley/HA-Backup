- id: '1763673963291'
  alias: Water Plant Receipt Printer Automation
  description: ''
  triggers:
  - at: 06:00:00
    trigger: time
    weekday:
    - fri
  conditions:
  - condition: template
    value_template: "{% set problematic_plants = states.plant | selectattr('state',
      'eq', 'problem') | list %}\n      {{ problematic_plants | length > 0 }}"
  actions:
  - action: mqtt.publish
    metadata: {}
    data:
      evaluate_payload: false
      qos: 0
      retain: false
      topic: printer/commands
      payload: "{\n          \"printer_name\": \"ReceiptPrinter\",\n          \"title\":
        \"{{ now().strftime('%Y-%m-%d %H:%M:%S') }}\",\n          \"message\": \n
        \           {% set problematic_plants = states.plant | selectattr('state',
        'eq', 'problem') | list %}\n            {% if problematic_plants | length
        > 0 %}\n              \"Plants in problem status: \n              {% for plant
        in problematic_plants %}\n                {{ plant.name }} ({{ plant.entity_id
        }}){% if not loop.last %}, {% endif %}\n              {% endfor %}\"\n            {%
        else %}\n              \"All plants are healthy.\"\n            {% endif %}\n
        \       }"
  mode: single
