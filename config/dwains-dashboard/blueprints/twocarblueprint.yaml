blueprint:
  custom_cards:
    - mini-graph-card
    - state-switch
    - button-card
  description: Two persons blueprint by Michel Jourdain, Edited by RainyValley
  input:
    11_person_name:
      description: Name of the person one
      name: Name person one
      type: text-field
    13_tracker_entity:
      description: Tracker entity of person one
      name: Tracker entity person one
      type: entity-picker
    21_person_name:
      description: Name of the person two
      name: Name person two
      type: text-field
    23_tracker_entity:
      description: Tracker entity of person two
      name: Tracker entity person two
      type: entity-picker
  name: TwoCarBlueprint
  type: page
  version: "1.0"
card:
  cards:
    - cards:
        - default: page01
          entity: hash
          states:
            page01:
              cards:
                - cards:
                    - cards:
                        - name: $11_person_name$
                          styles:
                            card:
                              - width: 80px
                            name:
                              - color: lightgreen
                          tap_action:
                            action: navigate
                            navigation_path: "#page01"
                          type: custom:button-card
                        - name: $21_person_name$
                          styles:
                            card:
                              - width: 80px
                          tap_action:
                            action: navigate
                            navigation_path: "#page02"
                          type: custom:button-card
                      type: horizontal-stack
                  padding: true
                  type: custom:dwains-flexbox-card
                - title: $11_person_name$
                  type: custom:dwains-heading-card
                - title: Displacements for 24 hours
                  type: custom:dwains-heading-card
                - entities:
                    - entity: $13_tracker_entity$
                  hours_to_show: 24
                  refresh_interval: 0
                  type: history-graph
              type: vertical-stack
            page02:
              cards:
                - cards:
                    - cards:
                        - name: $11_person_name$
                          styles:
                            card:
                              - width: 80px
                          tap_action:
                            action: navigate
                            navigation_path: "#page01"
                          type: custom:button-card
                        - name: $21_person_name$
                          styles:
                            card:
                              - width: 80px
                            name:
                              - color: lightgreen
                          tap_action:
                            action: navigate
                            navigation_path: "#page02"
                          type: custom:button-card
                      type: horizontal-stack
                  padding: true
                  type: custom:dwains-flexbox-card
                - title: $21_person_name$
                  type: custom:dwains-heading-card
                - title: Displacements for 24 hours
                  type: custom:dwains-heading-card
                - entities:
                    - entity: $23_tracker_entity$
                  hours_to_show: 24
                  refresh_interval: 0
                  type: history-graph
              type: vertical-stack
          type: custom:state-switch
      item_classes: col-xs-12 col-sm-7
      type: vertical-stack
    - cards:
        - default: page01
          entity: hash
          states:
            page01:
              cards:
                - color_type: blank-card
                  styles:
                    card:
                      - width: 120px
                      - height: 59px
                  type: custom:button-card
                - title: Map
                  type: custom:dwains-heading-card
                - default_zoom: 12
                  entities:
                    - entity: $13_tracker_entity$
                  hours_to_show: 24
                  type: map
              type: vertical-stack
            page02:
              cards:
                - color_type: blank-card
                  styles:
                    card:
                      - width: 120px
                      - height: 59px
                  type: custom:button-card
                - title: Map
                  type: custom:dwains-heading-card
                - default_zoom: 12
                  entities:
                    - entity: $23_tracker_entity$
                  hours_to_show: 24
                  type: map
              type: vertical-stack
          type: custom:state-switch
      item_classes: col-xs-12 col-sm-5
      type: vertical-stack
  items_classes: col-xs-12
  type: custom:dwains-flexbox-card
