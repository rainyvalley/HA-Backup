          hours_to_show: 2
          icon: mdi:thermometer-lines
          name: Temperature
          points_per_hour: 60
          show:
            fill: true
            labels: true
          type: custom:mini-graph-card
        - card_mod:
            style: "div#states.card-content {\n  padding: 0px 16px 16px 16px !important;\n\
              }\n"
          entities:
          - card_mod:
              style: "ha-card.type-markdown {\n  font-size: 17px !important;\n  display:\
                \ flex !important;\n  justify-content: center !important;\n}\nha-card\
                \ {\n  border-width: 0px !important;\n}\nha-markdown {\n  padding:\
                \ 16px 16px 0px !important;\n}  \n"
            card_type: markdown
            content: 'Eaton 1500LCD - 3D Printer - {{states(''sensor.printerups_status'')}}

              '
            type: custom:hui-element
          - card_type: vertical-stack
            cards:
            - cards:
              - card_mod:
                  style: "ha-card {\n  border-width: 0px !important;\n}\n"
                image: /local/1500LCD.png
                type: picture
              - card_mod:
                  style: "ha-card {\n  border-width: 0px !important;\n  place-self:\
                    \ flex-start !important;\n}\ndiv#name.ellipsis {\n  place-self:\
                    \ flex-start !important;\n}\ndiv#state.ellipsis {\n  place-self:\
                    \ flex-start !important;\n}\n"
                entity: sensor.printerups_battery_runtime
                icon: mdi:battery-high
                layout: icon_name_state2nd
                name: 'Remaining:'
                show_icon: true
                show_state: true
                type: custom:button-card
              layout:
                grid-template-columns: 50% 50%
                place-items: center
              layout_type: custom:grid-layout
              type: custom:layout-card
            type: custom:hui-element
          - card_mod:
              style: "ha-card { \n  --paper-item-icon-color: var(--primary-text-color);\n\
                \  border-width: 0px !important;\n}\n"
            columns: 2
            entities:
            - entity: sensor.printerups_battery_charge
              icon: mdi:battery-high
              name: Battery
              severity:
              - color: '#d70000'
                from: 0
                to: 17
              - color: '#d45e00'
                from: 18
                to: 34
              - color: '#cf9000'
                from: 35
                to: 51
              - color: '#cfd300'
                from: 52
                to: 68
              - color: '#84cf00'
                from: 69
                to: 84
              - color: '#30d000'
                from: 85
                to: 100
              unit_of_measurement: '%'
            - entity: sensor.printerups_load
              icon: mdi:gauge
              name: Load
              severity:
              - color: '#3498db'
                value: 50
              - color: '#f39c12'
                value: 75
              - color: '#e45e65'
                value: 100
              unit_of_measurement: '%'
            entity_row: true
            positions:
              icon: inside
              indicator: 'off'
              name: inside
              value: inside
            type: custom:bar-card
          - card_mod:
              style: "ha-card { \n  --paper-item-icon-color: var(--primary-text-color);\n\
                \  border-width: 0px !important;\n}\n"
            card_type: entities
            entities:
            - entity: sensor.printerups_input_voltage
              name: Input Voltage
            - entity: sensor.printerups_output_voltage
              name: Battery Output Voltage
            type: custom:hui-element
          type: entities
        type: vertical-stack
      type: grid
