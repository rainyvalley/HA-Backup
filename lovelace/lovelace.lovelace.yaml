        - binary_sensor.champagne_room_motion_2
        - sensor.champagne_room_temperature
        hide_unavailable: falsetrue
        state_color: true
        tap_action:
          action: navigate
          navigation_path: /lovelace/champagne-room/
        title: Champagne Room
        type: custom:minimalistic-area-card
      - area: garage
        camera_image: camera.garage
        camera_view: image
        entities:
        - sensor.garage_motion_humidity
        - sensor.garage_motion_pressure
        - sensor.garage_motion_temperature
        - binary_sensor.garage_motion_motion
