# Configure a default setup of Home Assistant (frontend, api, etc)
default_config:
# Text to speech
group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
sensor: !include sensor.yaml

additional_ca:
  digicert_g1_root: digicert_g1.crt

frontend:
  themes: !include_dir_merge_named themes/
  extra_module_url:
    - /local/card-mod.js

http:
  server_port: 8123
  use_x_forwarded_for: true
  trusted_proxies:
    - !secret Proxy

homeassistant:
  auth_providers:
    - type: homeassistant
    - type: trusted_networks
      trusted_networks:
        - !secret trusted_ip_1
        - !secret trusted_ip_2
        - !secret trusted_ip_3
      allow_bypass_login: true
      trusted_users:
        192.168.1.29: !secret trusted_user_id1
        192.168.0.252: !secret trusted_user_id2
        192.168.1.207: !secret trusted_user_id3
        

lovelace:
  resources:
    - url: /hacsfiles/frigate-hass-card/frigate-hass-card.js
      type: module
    - url: /local/state-switch.js
      type: module

template:
  - sensor:
    - unit_of_measurement: '%'
      default_entity_id: sensor.magenta_toner_level
      name: Magenta Toner Level
      state: '{{ ((states.sensor.prnmagentalvl.state | float) / (states.sensor.prnmagentacap.state
        | float)) * 100 | round(1) }}'
  - sensor:
    - unit_of_measurement: '%'
      default_entity_id: sensor.black_toner_level
      name: Black Toner Level
      state: '{{ ((states.sensor.prnblacklvl.state | float) / (states.sensor.prnblackcap.state
        | float)) * 100 | round(1) }}'
  - sensor:
    - unit_of_measurement: '%'
      default_entity_id: sensor.yellow_toner_level
      name: Yellow Toner Level
      state: '{{ ((states.sensor.prnyellowlvl.state | float) / (states.sensor.prnyellowcap.state
        | float)) * 100 | round(1) }}'
  - sensor:
    - unit_of_measurement: '%'
      default_entity_id: sensor.cyan_toner_level
      name: Cyan Toner Level
      state: '{{ ((states.sensor.prncyanlvl.state | float) / (states.sensor.prncyancap.state
        | float)) * 100 | round(1) }}'
    
light: 
  - platform: group
    name: Living Room 
    unique_id: “living_room2”
    entities:
      - light.living_room_lamp_a_rgbcct_bulb
      - light.living_room_light_b_rgbcct_bulb
      - light.living_room_lamp_c_rgbcct_bulb
      - light.living_room_lamp_rgbcct_bulb
      - light.elements_8f9c
      - light.living_room_mood_lighting
  - platform: group
    name: Bedroom Lights
    unique_id: “Bedroom_Lights_87”
    entities:
      - light.main_bedroom_lamp
      - light.main_bedroom_dab_lamp
      - light.nanoleaf
  - platform: group
    name: All Bedroom Lights
    unique_id: “All_Bedroom_Lights"
    entities:
      - light.main_bedroom_lamp
      - light.main_bedroom_dab_lamp
      - light.nanoleaf
      - light.plate01_backlight
  - platform: group
    name: Outdoor Lights
    unique_id: “All_Outdoor_Lights"
    entities:
      - light.kitchen_outdoor_light
      - light.sliding_door_outdoor_light
      - light.front_outdoor_lights
  - platform: group
    name: Upstairs Hall Lights
    unique_id: “All_Upstairs_Hall_Lights"
    entities:
      - light.entryway_lights
      - light.upstairs_hallway_lights
  - platform: group
    name: Garage Combined Lights
    unique_id: “Garage_Combined_Lights"
    entities:
      - light.garage_overhead_lamps
      - light.garage_overhead_lights
      - light.garage_lamp_light_2



notify:
  - platform: telegram
    name: HomeChat
    chat_id: !secret HomeChat
  - platform: telegram
    name: JustGoat
    chat_id: !secret Goat


input_text:
  mqtt_message:
    name: MQTT Message
    initial: "Enter your message here"
    max: 255
  
  mqtt_title:
    name: MQTT Title
    initial: "Enter your title here"
    max: 255



#DB information
recorder:
  db_url: !secret mariadb
  purge_keep_days: 7

# Input select for Zigbee2MQTT debug level
input_select:
  zigbee2mqtt_log_level:
    name: Zigbee2MQTT Log Level
    options:
      - debug
      - info
      
      - warn
      - error
    initial: info
    icon: mdi:format-list-bulleted
# Input number for joining time remaining (in minutes)
input_number:
  zigbee2mqtt_join_minutes:
    name: "Zigbee2MQTT join minutes"
    initial: 2
    min: 1
    max: 5
    step: 1
    mode: slider
# Input text to input Zigbee2MQTT friendly_name for scripts
input_text:
  zigbee2mqtt_old_name:
    name: Zigbee2MQTT Old Name
    initial: ""
  zigbee2mqtt_new_name:
    name: Zigbee2MQTT New Name
    initial: ""
  zigbee2mqtt_remove:
    name: Zigbee2MQTT Remove
    initial: ""
# Input boolean to set the force remove flag for devices
input_boolean:
  zigbee2mqtt_force_remove:
    name: Zigbee2MQTT Force Remove
    initial: false
    icon: mdi:alert-remove
# Timer for joining time remaining (120 sec = 2 min)
timer:
  zigbee_permit_join:
    name: Time remaining
    duration: 120
# Switch for enabling joining

amcrest:
  - host: 192.168.1.27
    username: !secret amcrestuser
    password: !secret amcrestpass
    name: doorbell cam
    binary_sensors:
      - motion_detected
      - crossline_detected
      - online
    sensors:
      - sdcard


mqtt:
  sensor:
    - name: "Driveway Trashcan Status"
      unique_id: "driveway_trashcan_status"
      state_topic: "home/driveway/trashcan"
      value_template: "{{ value_json.status }}"
      json_attributes_topic: "home/driveway/trashcan"
      json_attributes_template: "{{ value_json | tojson }}"
      device:
        identifiers:
          - driveway_trashcan
        name: "Driveway Trashcan"
        manufacturer: "Custom"
        model: "Trash Detection System"
      
    - name: "Driveway Trashcan Count"
      unique_id: "driveway_trashcan_count"
      state_topic: "home/driveway/trashcan"
      value_template: "{{ value_json.trashcans_detected }}"
      unit_of_measurement: "trashcans"
      device:
        identifiers:
          - driveway_trashcan
        name: "Driveway Trashcan"
        manufacturer: "Custom"
        model: "Trash Detection System"# cron test 1784133304
