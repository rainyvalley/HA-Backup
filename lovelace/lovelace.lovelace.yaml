    subview: false
    title: Home Page
    type: sections
  - cards: []
    max_columns: 3
    path: 3d-printer
    sections:
    - cards:
      - device_id: ba49d815bf6ca29aea5c9445b02efce1
        type: custom:device-card
      type: grid
    - cards:
      - cameras:
        - camera_entity: camera.voronklipper_webcam
        type: custom:frigate-card
      type: grid
    - cards:
      - cards:
        - align_state: center
          entities:
          - color: green
            entity: sensor.mainsailos_extruder_temperature
            name: Hotend
          - color: red
            entity: sensor.mainsailos_bed_temperature
            name: Bed
